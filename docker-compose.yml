services:

  go2rtc:
    image: alexxit/go2rtc:latest
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./go2rtc:/config
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache gettext 2>/dev/null || true
        envsubst < /config/config.yaml.tpl > /tmp/go2rtc.yaml
        go2rtc -config /tmp/go2rtc.yaml
    environment:
      CAM1_IP: ${CAM1_IP}
      CAM1_PORT: ${CAM1_PORT}
      CAM1_USER: ${CAM1_USER}
      CAM1_PASS: ${CAM1_PASS}
      CAM2_IP: ${CAM2_IP}
      CAM2_PORT: ${CAM2_PORT}
      CAM2_USER: ${CAM2_USER}
      CAM2_PASS: ${CAM2_PASS}

  mosquitto:
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    restart: unless-stopped
    privileged: true
    shm_size: "256mb"
    runtime: nvidia
    ports:
      - "5000:5000"
      - "8554:8554"
      - "8555:8555/tcp"
      - "8555:8555/udp"
    volumes:
      - ./frigate/config.yml:/config/config.yml:ro
      - frigate-media:/media/frigate
      - frigate-model-cache:/config/model_cache
      - /etc/localtime:/etc/localtime:ro
    environment:
      FRIGATE_RTSP_PASSWORD: ${FRIGATE_RTSP_PASSWORD}
      FRIGATE_MQTT_USER: ${FRIGATE_MQTT_USER}
      FRIGATE_MQTT_PASSWORD: ${FRIGATE_MQTT_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mosquitto
      - go2rtc

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cat-observer:
    image: ghcr.io/rajkumaar23/cat-monitor:latest
    restart: unless-stopped
    ports:
      - "${OBSERVER_PORT:-8088}:8088"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      FRIGATE_URL: http://frigate:5000
      OLLAMA_URL: ${OLLAMA_URL}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-moondream}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      frigate:
        condition: service_started

volumes:
  mosquitto-data:
  mosquitto-log:
  frigate-media:
  frigate-model-cache:
  postgres-data:
