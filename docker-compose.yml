services:

  go2rtc:
    image: alexxit/go2rtc:latest
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./go2rtc:/config
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache gettext 2>/dev/null || true
        envsubst < /config/config.yaml.tpl > /tmp/go2rtc.yaml
        go2rtc -config /tmp/go2rtc.yaml
    environment:
      CAM1_IP: ${CAM1_IP}
      CAM1_PORT: ${CAM1_PORT}
      CAM1_USER: ${CAM1_USER}
      CAM1_PASS: ${CAM1_PASS}
      CAM2_IP: ${CAM2_IP}
      CAM2_PORT: ${CAM2_PORT}
      CAM2_USER: ${CAM2_USER}
      CAM2_PASS: ${CAM2_PASS}

  nano-llm:
    image: ${NANO_LLM_IMAGE:-dustynv/nano_llm:r36.2.0}
    runtime: nvidia
    restart: unless-stopped
    ports:
      - "8085:8085"
    volumes:
      - ./nano-llm/server.py:/app/server.py
      - nano-llm-models:/data/models
    working_dir: /app
    command: >
      bash -c "pip3 install --quiet --no-cache-dir 'fastapi>=0.115' 'uvicorn[standard]' pillow &&
               python3 /app/server.py"
    environment:
      VILA_MODEL: ${VILA_MODEL:-Efficient-Large-Model/VILA1.5-3b}
      MAX_NEW_TOKENS: ${MAX_NEW_TOKENS:-96}
      HF_HOME: /data/models
      TRANSFORMERS_CACHE: /data/models

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cat-observer:
    image: ghcr.io/rajkumaar23/cat-monitor:latest
    restart: unless-stopped
    ports:
      - "${OBSERVER_PORT:-8088}:8088"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GO2RTC_URL: http://host.docker.internal:1984
      NANO_LLM_URL: http://nano-llm:8085
      CAMERAS: ${CAMERAS:-living_room,bedroom}
      POLL_INTERVAL: ${POLL_INTERVAL:-30}
      MOTION_THRESHOLD: ${MOTION_THRESHOLD:-0.02}
      MAX_NEW_TOKENS: ${MAX_NEW_TOKENS:-96}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  nano-llm-models:
  postgres-data:
