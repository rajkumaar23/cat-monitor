# Main host: go2rtc + cat-observer + postgres
# Run with: docker compose up -d
# Requires JETSON_IP in .env pointing to the Jetson running docker-compose.jetson.yml

services:

  go2rtc:
    image: alexxit/go2rtc:latest
    restart: unless-stopped
    ports:
      - "1984:1984"
    networks:
      - cat-net
    volumes:
      - ./go2rtc:/config
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache gettext 2>/dev/null || true
        envsubst < /config/config.yaml.tpl > /tmp/go2rtc.yaml
        go2rtc -config /tmp/go2rtc.yaml
    environment:
      CAM1_IP: ${CAM1_IP}
      CAM1_PORT: ${CAM1_PORT}
      CAM1_USER: ${CAM1_USER}
      CAM1_PASS: ${CAM1_PASS}
      CAM2_IP: ${CAM2_IP}
      CAM2_PORT: ${CAM2_PORT}
      CAM2_USER: ${CAM2_USER}
      CAM2_PASS: ${CAM2_PASS}

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - cat-net
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cat-observer:
    image: ghcr.io/rajkumaar23/cat-monitor:latest
    restart: unless-stopped
    ports:
      - "${OBSERVER_PORT:-8088}:8088"
    networks:
      - cat-net
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GO2RTC_URL: http://go2rtc:1984
      NANO_LLM_URL: http://${JETSON_IP}:8085
      CAMERAS: ${CAMERAS:-living_room,bedroom}
      POLL_INTERVAL: ${POLL_INTERVAL:-2}
      MOTION_THRESHOLD: ${MOTION_THRESHOLD:-0.005}
      MAX_NEW_TOKENS: ${MAX_NEW_TOKENS:-96}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy

networks:
  cat-net:

volumes:
  postgres-data:
